name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run full test suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest -q

  smoke-test:
    name: Smoke tests (backend/app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies for smoke
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt
          pip install itsdangerous mysql-connector-python pytest

      - name: Show CI marker
        run: |
          echo "SMOKE TEST: GitHub Actions a bien lance le workflow"

      - name: Run smoke pytest
        run: pytest -q
