name: CI Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt
          pip install itsdangerous mysql-connector-python pytest

      - name: Show CI marker
        run: |
          echo "SMOKE TEST: GitHub Actions a bien lance le workflow"

      - name: Run pytest
        run: pytest -q
